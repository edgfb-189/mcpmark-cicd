name: Deployment Status
on:
  push:
    branches: [ main ]

jobs:
  pre-deployment:
    name: pre-deployment
    runs-on: ubuntu-latest
    outputs:
      issue_number: ${{ steps.create-issue.outputs.issue_number }}
      previous_commit: ${{ steps.get-previous-commit.outputs.previous_commit }}
      current_commit: ${{ github.sha }}
      package_version: ${{ steps.get-package-version.outputs.package_version }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Run lint
        run: npm run lint

      - name: Run test
        run: npm run test

      - name: Get previous commit SHA
        id: get-previous-commit
        run: echo "previous_commit=$(git rev-parse HEAD~1)" >> $GITHUB_OUTPUT

      - name: Get package version
        id: get-package-version
        run: echo "package_version=$(npm pkg get version | tr -d '"')" >> $GITHUB_OUTPUT

      - name: Create deployment tracking issue
        id: create-issue
        uses: actions/github-script@v7
        with:
          script: |
            const { data: issue } = await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Deployment Tracking - ${context.sha}`,
              labels: ['deployment', 'in-progress'],
              body: `Deployment started for commit: ${context.sha}\nPrevious commit: ${{ steps.get-previous-commit.outputs.previous_commit }}\nPackage version: ${{ steps.get-package-version.outputs.package_version }}`
            });
            return issue.number;
          result-encoding: string

      - name: Post pre-deployment comment
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: ${{ steps.create-issue.outputs.issue_number }},
              body: "Pre-deployment checks completed"
            });

  rollback-preparation:
    name: rollback-preparation
    runs-on: ubuntu-latest
    needs: pre-deployment
    outputs:
      artifact_name: ${{ steps.create-artifact.outputs.artifact_name }}
      sha256_checksum: ${{ steps.generate-checksum.outputs.sha256_checksum }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Create rollback directory
        run: mkdir -p rollback

      - name: Create executable rollback script
        run: |
          cat > rollback/rollback.sh << 'EOF'
          #!/bin/bash
          set -euo pipefail

          # Rollback script for mcpmark-cicd
          echo "Starting rollback..."

          # Check if git is available
          if ! command -v git &> /dev/null; then
            echo "Error: git is not installed"
            exit 1
          fi

          # Check if npm is available
          if ! command -v npm &> /dev/null; then
            echo "Error: npm is not installed"
            exit 1
          fi

          # Revert to previous commit
          echo "Reverting to previous commit: ${{ needs.pre-deployment.outputs.previous_commit }}"
          git checkout ${{ needs.pre-deployment.outputs.previous_commit }}

          # Restore configuration files
          echo "Restoring configuration files..."
          if [ -f rollback/package.json ]; then
            cp rollback/package.json .
          else
            echo "Warning: package.json backup not found"
          fi

          if [ -f rollback/package-lock.json ]; then
            cp rollback/package-lock.json .
          else
            echo "Warning: package-lock.json backup not found"
          fi

          # Reinstall dependencies
          echo "Reinstalling dependencies..."
          npm install

          echo "Rollback completed successfully!"
          EOF
          chmod +x rollback/rollback.sh

      - name: Create configuration backups
        run: |
          cp package.json rollback/
          cp package-lock.json rollback/
          if [ -f .env.example ]; then
            cp .env.example rollback/
          fi

      - name: Create dependency verification script
        run: |
          cat > rollback/verify-dependencies.sh << 'EOF'
          #!/bin/bash
          set -euo pipefail

          # Dependency verification script for mcpmark-cicd
          echo "Verifying dependencies..."

          # Check if package.json exists
          if [ ! -f package.json ]; then
            echo "Error: package.json not found"
            exit 1
          fi

          # Check if package-lock.json exists
          if [ ! -f package-lock.json ]; then
            echo "Error: package-lock.json not found"
            exit 1
          fi

          # Verify dependency tree
          echo "Verifying dependency tree..."
          npm ci --dry-run

          echo "Dependency verification completed successfully!"
          EOF
          chmod +x rollback/verify-dependencies.sh

      - name: Create rollback documentation
        run: |
          cat > rollback/ROLLBACK_GUIDE.md << 'EOF'
          # Rollback Guide for mcpmark-cicd

          ## Overview
          This guide provides step-by-step instructions to rollback the deployment from commit ${{ needs.pre-deployment.outputs.current_commit }} to ${{ needs.pre-deployment.outputs.previous_commit }}.

          ## Prerequisites
          - Git installed
          - Node.js (version 20) installed
          - Access to the repository
          - Rollback package extracted

          ## Steps
          1. Extract the rollback package:
             ```bash
             unzip rollback-package-${{ needs.pre-deployment.outputs.current_commit }}.zip
             cd rollback
             ```

          2. Run the executable rollback script:
             ```bash
             ./rollback.sh
             ```

          3. Verify the rollback:
             ```bash
             ./verify-dependencies.sh
             git log --oneline -1
             npm run test
             ```

          4. Confirm the deployment issue is updated with "Rollback Completed" status.

          ## Troubleshooting
          - If git checkout fails: Ensure you have a clean working directory.
          - If npm install fails: Check for network issues or corrupted package-lock.json.
          - If verification fails: Review the error messages and check dependency versions.
          EOF

      - name: Compress rollback package
        id: create-artifact
        run: |
          ARTIFACT_NAME="rollback-package-${{ needs.pre-deployment.outputs.current_commit }}"
          zip -r "${ARTIFACT_NAME}.zip" rollback/
          echo "artifact_name=${ARTIFACT_NAME}.zip" >> $GITHUB_OUTPUT

      - name: Generate SHA256 checksum
        id: generate-checksum
        run: |
          ARTIFACT_NAME="${{ steps.create-artifact.outputs.artifact_name }}"
          SHA256=$(sha256sum "${ARTIFACT_NAME}" | awk '{print $1}')
          echo "sha256_checksum=${SHA256}" >> $GITHUB_OUTPUT

      - name: Upload rollback artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.create-artifact.outputs.artifact_name }}
          path: ${{ steps.create-artifact.outputs.artifact_name }}
          retention-days: 30

      - name: Post rollback plan comment
        uses: actions/github-script@v7
        with:
          script: |
            const issueNumber = ${{ needs.pre-deployment.outputs.issue_number }};
            const previousCommit = ${{ needs.pre-deployment.outputs.previous_commit }};
            const currentCommit = ${{ needs.pre-deployment.outputs.current_commit }};
            const packageVersion = ${{ needs.pre-deployment.outputs.package_version }};
            const artifactName = ${{ steps.create-artifact.outputs.artifact_name }};
            const sha256Checksum = ${{ steps.generate-checksum.outputs.sha256_checksum }};

            const commentBody = `
            🔄 Rollback Plan Ready

            Previous Commit: ${previousCommit}
            Current Commit: ${currentCommit}
            Package Version: ${packageVersion}
            Artifact: ${artifactName}

            ✅ Executable rollback script created
            ✅ Configuration backups (package.json, package-lock.json)
            ✅ Dependency verification script
            ✅ Detailed rollback documentation
            ✅ Compressed rollback package with SHA256 checksum

            ### Quick Rollback Command
            \`\`\`bash
            # Extract and run rollback
            unzip ${artifactName}
            cd rollback
            ./rollback.sh
            ./verify-dependencies.sh
            \`\`\`

            Script verification status: "Rollback script created: true"
            Backup verification status: "Configuration backup: true"
            SHA256: ${sha256Checksum}
            `;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              body: commentBody
            });

  post-deployment:
    name: post-deployment
    runs-on: ubuntu-latest
    needs: [pre-deployment, rollback-preparation]
    steps:
      - name: Update issue labels
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.removeLabel({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: ${{ needs.pre-deployment.outputs.issue_number }},
              name: 'in-progress'
            });

            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: ${{ needs.pre-deployment.outputs.issue_number }},
              labels: ['completed']
            });

      - name: Post final comment
        uses: actions/github-script@v7
        with:
          script: |
            const issueNumber = ${{ needs.pre-deployment.outputs.issue_number }};
            const artifactName = ${{ needs.rollback-preparation.outputs.artifact_name }};
            const sha256Checksum = ${{ needs.rollback-preparation.outputs.sha256_checksum }};

            const commentBody = `
            Deployment Completed Successfully

            Rollback Artifact Details:
            - Name: ${artifactName}
            - SHA256: ${sha256Checksum}
            - Retention: 30 days

            To rollback, download the artifact from the workflow run and follow the instructions in ROLLBACK_GUIDE.md.
            `;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              body: commentBody
            });

      - name: Close deployment issue
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: ${{ needs.pre-deployment.outputs.issue_number }},
              state: 'closed'
            });
